<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>プロジェクト進捗ダッシュボード｜ジャパンマテックス様 × Dooox</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="top"><div class="wrap" style="padding-bottom:0">
  <div class="kick">PROJECT DASHBOARD</div>
  <h1 id="proj-title">プロジェクト進捗ダッシュボード</h1>
  <div class="sub" id="proj-sub"></div>
  <div class="badges">
    <span class="note" id="proj-note"></span>
    <span class="sync" id="sync" title="共有状態">同期状態を確認中…</span>
  </div>
</div></header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>

  <!-- 全体進捗 -->
  <div class="card" style="margin-top:20px">
    <h2>全体進捗</h2>
    <div class="phasebar" id="phasebar"></div>
    <div class="muted" id="proj-progress-note" style="margin-top:10px"></div>
    <div class="nextmtg" id="next-mtg"></div>
  </div>

  <div class="cols">
    <div>
      <!-- 直近の動き（詳細） -->
      <div class="card recent" id="recent-card" style="margin-top:16px">
        <h2>直近の動き</h2>
        <div id="recent"></div>
      </div>

      <!-- タスク -->
      <div class="card" style="margin-top:16px">
        <h2>タスク・ToDo</h2>
        <table id="tasks"><thead><tr><th>タスク</th><th>担当</th><th>期日</th><th>状態</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <div>
      <!-- ミーティング時系列（クリックで全文） -->
      <div class="card" style="margin-top:16px">
        <h2>ミーティング時系列 <span class="muted" style="font-weight:400">（各回をクリックで議事録全文）</span></h2>
        <div class="tl" id="timeline"></div>
      </div>
    </div>
  </div>

  <!-- 議事録の反映（全員に共有） -->
  <div class="card feed">
    <h2>議事録・文字起こしを反映（全員に共有）</h2>
    <div class="muted" style="margin-bottom:8px">議事録の本文を貼り付けて「ダッシュボードに反映」を押すと、時系列（全文付き）とタスクに追加され、<b>全員の画面に即時共有</b>されます（Supabase未設定時はこの端末のみに保存）。</div>
    <textarea id="ta" placeholder="例：&#10;2026/06/22 社長打合せ&#10;・着手施策を入金管理マスターに決定&#10;・TODO（Dooox）：入金管理マスターのPoC設計（期日：6/30）&#10;・TODO（JM）：販管CSVと入金条件表のサンプル共有（期日：6/27）"></textarea>
    <div>
      <button id="btn-reflect">ダッシュボードに反映</button>
      <button class="ghost" id="btn-sample">サンプルを入れる</button>
    </div>
  </div>
  <div class="muted" id="foot" style="margin-top:14px;text-align:center"></div>
</div>

<!-- 議事録 全文モーダル -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-bg" id="modal-bg"></div>
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <div>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-x" id="modal-x" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast">反映しました</div>

<!-- Firebase（Cloud Firestore で全員に共有）。未設定なら自動で localStorage にフォールバック -->
<script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
